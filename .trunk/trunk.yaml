# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.7.4
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.10.8
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  ignore:
    - linters: [codespell]
      paths:
        - '**/*.svg'
  enabled:
    - eslint@9.32.0
    - codespell@2.4.1
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - checkov@3.2.500
    - git-diff-check
    - hadolint@2.14.0
    - markdownlint@0.47.0
    - osv-scanner@2.3.2
    - oxipng@10.1.0
    - prettier@3.8.1
    - svgo@4.0.0
    - trufflehog@3.93.1
    - yamllint@1.38.0
actions:
  definitions:
    - id: trunk-check-all-pre-push
      display_name: Trunk Check All Pre-Push
      description: Run `trunk check --all` before pushing
      run: trunk check --all
      triggers:
        - git_hooks: [pre-push]
    - id: typecheck-pre-push
      display_name: Typecheck Pre-Push
      description: Run TypeScript type checking before pushing
      run: pnpm run typecheck
      triggers:
        - git_hooks: [pre-push]
    - id: test-pre-push
      display_name: Test Pre-Push
      description: Run tests with coverage before pushing
      run: pnpm run test:coverage
      triggers:
        - git_hooks: [pre-push]
  disabled:
    - trunk-announce
    - trunk-check-pre-push # Disabled in favor of trunk-check-all-pre-push
  enabled:
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
    - trunk-check-all-pre-push
    - typecheck-pre-push
    - test-pre-push
